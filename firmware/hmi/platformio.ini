; hw.pki-on-box HMI firmware (TRNG USB HID streamer)
; Три платы: WeAct G474CEU / G431CBU / H750VBT

[platformio]
default_envs = weact_g474ceu

[env]
monitor_speed    = 115200
upload_protocol  = cmsis-dap
debug_tool       = cmsis-dap
lib_archive      = no
board_build.boards_dir = boards

build_flags =
    -DUSE_HAL_DRIVER
    -DCUSTOM_HID_EPIN_SIZE=0x40
    -DCUSTOM_HID_EPOUT_SIZE=0x40
    -DUSBD_CUSTOMHID_OUTREPORT_BUF_SIZE=64
    -I${PROJECT_DIR}/src
    -I${PROJECT_DIR}/lib/usb_dfu/Core/Inc
    -I${PROJECT_DIR}/lib/usb_dfu/Class/CustomHID/Inc

; Общие src-файлы (без HAL-специфичных)
[common_src]
shared =
    +<${PROJECT_DIR}/src/main.c>
    +<${PROJECT_DIR}/src/trng_hid.c>
    +<${PROJECT_DIR}/src/usbd_desc.c>
    +<${PROJECT_DIR}/src/usbd_customhid.c>

lib_ignore =
    STM32_USB_Device_Library-Core
    STM32_USB_Device_Library-CustomHID

; ── G474CEU (128KB RAM, 512KB Flash) ──────────────────────────
[env:weact_g474ceu]
platform    = https://github.com/platformio/platform-ststm32.git
framework   = stm32cube
board       = weact_g474ceu
build_flags =
    ${env.build_flags}
    -DSTM32G474xx
build_src_filter =
    ${common_src.shared}
    +<${PROJECT_DIR}/boards/startup_stm32g474xx.s>
    +<${PROJECT_DIR}/src/stm32g4xx_it.c>
    +<${PROJECT_DIR}/src/SystemClock_Config.c>
    +<${PROJECT_DIR}/src/usbd_conf.c>
lib_ignore = ${common_src.lib_ignore}

; ── G431CBU (32KB RAM, 128KB Flash) ───────────────────────────
[env:weact_g431cbu]
platform    = https://github.com/platformio/platform-ststm32.git
framework   = stm32cube
board       = weact_g431cbu
build_flags =
    ${env.build_flags}
    -DSTM32G431xx
build_src_filter =
    ${common_src.shared}
    +<${PROJECT_DIR}/boards/startup_stm32g431xx.s>
    +<${PROJECT_DIR}/src/stm32g4xx_it.c>
    +<${PROJECT_DIR}/src/SystemClock_Config.c>
    +<${PROJECT_DIR}/src/usbd_conf.c>
lib_ignore = ${common_src.lib_ignore}

; ── H750VBT (1MB RAM, 128KB Flash, Cortex-M7 480MHz) ─────────
[env:weact_h750vbt]
platform    = https://github.com/platformio/platform-ststm32.git
framework   = stm32cube
board       = weact_h750vbt
build_flags =
    ${env.build_flags}
    -DSTM32H750xx
build_src_filter =
    ${common_src.shared}
    +<${PROJECT_DIR}/src/hal_h7/stm32h7xx_it.c>
    +<${PROJECT_DIR}/src/hal_h7/SystemClock_Config.c>
    +<${PROJECT_DIR}/src/hal_h7/usbd_conf.c>
lib_ignore = ${common_src.lib_ignore}
