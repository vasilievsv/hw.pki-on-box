name: CI

on:
  push:
    branches: [main, "feature/*"]
    paths-ignore:
      - "*.md"
      - "README*.md"
      - "docs/**"
      - "LICENSE"
      - ".gitignore"
  pull_request:
    branches: [main]
    paths-ignore:
      - "*.md"
      - "README*.md"
      - "docs/**"
      - "LICENSE"
      - ".gitignore"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: asw/PKI/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r asw/PKI/requirements-dev.txt

      - name: Lint (flake8)
        run: flake8 asw/PKI/

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: asw/PKI/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r asw/PKI/requirements-dev.txt

      - name: Run tests
        env:
          PKI_TRNG_MODE: software
          PYTHONPATH: asw/PKI
        run: pytest asw/PKI/tests/ -v --tb=short -m "not target"

  drift-check:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.13"

      - name: Drift check — host (crypto-engine contract)
        continue-on-error: true
        run: python scripts/drift_check_host.py

      - name: Drift check — firmware (trng_hid contract)
        continue-on-error: true
        run: python scripts/drift_check_firmware.py

  security-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Check for private keys in repo
        run: |
          echo "Scanning for private key files..."
          FOUND=$(find . -type f \( -name "*.pem" -o -name "*.key" -o -name "*.p12" -o -name "*.pfx" -o -name "*.der" \) \
            ! -path "./.git/*" ! -path "*/test*" ! -path "*fixture*" || true)
          if [ -n "$FOUND" ]; then
            echo "::error::Private key files found: $FOUND"
            exit 1
          fi

      - name: Check for private key content
        run: |
          echo "Scanning file contents for private keys..."
          if grep -rn "BEGIN \(RSA \|EC \)\?PRIVATE KEY" --include="*.py" --include="*.yaml" --include="*.yml" --include="*.json" --include="*.txt" --include="*.md" . 2>/dev/null | grep -v ".git/" | grep -v "test" | grep -v "grep"; then
            echo "::error::Private key content found in source files"
            exit 1
          fi
          echo "No private keys found in source files"