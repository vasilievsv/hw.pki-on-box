name: CI

on:
  push:
    branches: [main, "feature/*"]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: asw/PKI/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r asw/PKI/requirements-dev.txt

      - name: Lint (flake8)
        run: flake8 asw/PKI/

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: asw/PKI/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r asw/PKI/requirements-dev.txt

      - name: Run tests
        env:
          PKI_TRNG_MODE: software
          PYTHONPATH: asw/PKI
        run: pytest asw/PKI/tests/ -v --tb=short
