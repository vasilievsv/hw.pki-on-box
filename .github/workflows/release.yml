name: Release

on:
  push:
    tags: ["v*.*.*"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: asw/PKI/requirements-dev.txt

      - name: Run tests
        env:
          PKI_TRNG_MODE: software
        run: |
          pip install -r asw/PKI/requirements-dev.txt
          pytest asw/PKI/tests/ -v --tb=short

      - name: Log in to GHCR
        uses: docker/login-action@v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push release image
        uses: docker/build-push-action@v6.15.0
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/pki-on-box:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/pki-on-box:latest

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.2.1
        with:
          generate_release_notes: true
